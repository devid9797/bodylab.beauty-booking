<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BodyLab.Beauty — Pieraksts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4ECE2;
    --card:#FFFEFA;
    --border:#F4ECE2;
    --accent:#747372;
    --accent-soft:#9B9A99;
    --text:#747372;
    --text-soft:#A8A6A4;
    --chip-bg:#F4ECE2;
    --chip-border:#E6DBCB;
    --chip-hover:#EFE6D8;
    --chip-selected:#747372;
    --glow:#9B9A99;
    --glow-soft:rgba(116,115,114,.35);
    --day-muted:#D2CFC9;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Montserrat',sans-serif;
    background:var(--bg);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:1.5rem 1rem 3rem;
    color:var(--text);
  }
  .wrap{max-width:440px;width:100%}
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:1.25rem;
    margin-bottom:1rem;
  }
  h1{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:600;color:var(--accent);margin-bottom:2px;text-align:center}
  .sub{font-size:13px;color:var(--accent-soft);text-align:center;margin-bottom:1rem}
  .divider{width:36px;height:1px;background:var(--chip-border);margin:.75rem auto}

  /* ---------- Language switch ---------- */
  .lang-switch{
    position:absolute;top:14px;right:14px;z-index:5;
  }
  .lang-toggle{
    display:flex;align-items:center;gap:6px;
    padding:6px 10px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,.5);
    background:rgba(255,254,250,.92);
    color:var(--accent);
    font-size:12px;font-weight:700;letter-spacing:.02em;
    cursor:pointer;font-family:inherit;
    box-shadow:0 2px 8px rgba(0,0,0,.18);
  }
  .lang-toggle svg{width:9px;height:9px;transition:transform .2s ease}
  .lang-switch.open .lang-toggle svg{transform:rotate(180deg)}
  .lang-menu{
    position:absolute;top:calc(100% + 6px);right:0;
    background:var(--card);
    border:1px solid var(--chip-border);
    border-radius:10px;
    padding:4px;
    min-width:68px;
    box-shadow:0 6px 18px rgba(0,0,0,.2);
    display:none;
    flex-direction:column;
    gap:2px;
  }
  .lang-switch.open .lang-menu{display:flex}
  .lang-option{
    padding:7px 10px;border-radius:6px;
    border:none;background:none;
    color:var(--text);font-size:12px;font-weight:600;text-align:left;
    cursor:pointer;font-family:inherit;
  }
  .lang-option:hover{background:var(--chip-bg)}
  .lang-option.active{background:var(--accent);color:var(--card)}

  /* ---------- Hero / intro ---------- */
  .hero-card{padding:0;overflow:hidden}
  .hero-photo{
    height:220px;
    position:relative;
    background:
      linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.18) 100%),
      url('https://i.postimg.cc/JnXK1cYd/DSC-0200.jpg');
    background-size:cover;
    background-position:center;
    overflow:hidden;
  }
  .hero-logo-wrap{display:flex;justify-content:center;margin-top:-45px;position:relative;z-index:2}
  .hero-logo{
    width:90px;height:90px;border-radius:50%;
    background:var(--card);
    box-shadow:0 4px 14px rgba(116,115,114,.25);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .hero-logo img{width:68%;height:auto;object-fit:contain}
  .hero-content{padding:10px 1.25rem 1.5rem;text-align:center}
  .hero-content h1{font-size:19px;letter-spacing:.02em;text-transform:uppercase}
  .hero-tagline{font-size:13px;color:var(--text-soft);margin:6px 0 14px;line-height:1.5}
  .social-row{display:flex;justify-content:center;gap:12px}
  .social-btn{
    width:36px;height:36px;border-radius:50%;
    border:1px solid var(--chip-border);
    background:var(--card);
    display:flex;align-items:center;justify-content:center;
    color:var(--accent);
    transition:background .15s;
  }
  .social-btn:hover{background:var(--chip-bg)}
  .social-btn svg{width:17px;height:17px}

  .empty,.loading,.error{font-size:13px;color:var(--text-soft);text-align:center;padding:1rem 0}

  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-nav-btn{
    width:32px;height:32px;border-radius:50%;border:1px solid var(--chip-border);
    background:var(--card);color:var(--accent);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s;
  }
  .cal-nav-btn:disabled{opacity:.3;cursor:default}
  .cal-nav-btn:not(:disabled):hover{background:var(--chip-bg)}
  .cal-month-label{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;letter-spacing:.01em;color:var(--accent);text-transform:capitalize}

  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
  .cal-weekdays span{
    font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    color:var(--text-soft);text-align:center
  }

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:6px}
  .cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center}
  .cal-day{
    position:relative;
    width:38px;height:38px;
    border:none;background:none;
    border-radius:50%;
    font-size:14px;font-weight:500;
    color:var(--day-muted);
    cursor:default;
    display:flex;align-items:center;justify-content:center;
    font-family:'Montserrat',sans-serif;
  }
  .cal-day.available{
    color:var(--accent);
    cursor:pointer;
    font-weight:600;
  }
  .cal-day.available::before{
    content:'';
    position:absolute;
    inset:-4px;
    border-radius:50%;
    background:radial-gradient(circle,var(--glow-soft) 0%,transparent 72%);
    animation:glow-pulse 2.6s ease-in-out infinite;
  }
  .cal-day.available:hover{background:var(--chip-bg)}
  .cal-day.today{box-shadow:inset 0 0 0 1px var(--chip-border)}
  @keyframes glow-pulse{
    0%,100%{opacity:.55;transform:scale(.9)}
    50%{opacity:1;transform:scale(1.08)}
  }
  @media (prefers-reduced-motion:reduce){
    .cal-day.available::before{animation:none;opacity:.8}
  }

  label{display:block;font-size:12px;font-weight:600;color:var(--accent);margin:12px 0 5px}
  label:first-of-type{margin-top:0}
  input,select{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--chip-border);
    background:var(--card);
    font-size:14px;
    color:var(--text);
    font-family:inherit;
  }
  input:focus,select:focus{outline:2px solid var(--accent-soft);outline-offset:1px}

  .phone-row{display:flex;gap:8px}
  .phone-code{width:96px;flex:none;padding-left:8px;padding-right:4px}
  .phone-row input{flex:1}

  .selected-slot{
    background:var(--chip-bg);
    border-radius:12px;
    padding:10px 12px;
    font-size:13px;
    color:var(--accent);
    font-weight:600;
    margin-bottom:4px;
  }

  .btn{
    display:block;
    width:100%;
    padding:13px;
    border-radius:12px;
    font-size:14px;
    font-weight:600;
    text-align:center;
    border:none;
    cursor:pointer;
    margin-top:16px;
    font-family:inherit;
  }
  .btn-primary{background:var(--accent);color:var(--card)}
  .btn-primary:disabled{background:var(--day-muted);cursor:not-allowed}
  .btn-outline{background:var(--card);color:var(--accent);border:1px solid var(--chip-border);text-decoration:none}
  .btn-outline:hover{background:var(--chip-bg)}
  .btn-success{background:#3F9142;color:#fff}
  .btn-danger{background:#B03030;color:#fff}
  .btn-icon{display:flex;align-items:center;justify-content:center;gap:9px}
  .btn-icon svg{width:19px;height:19px;flex:none}
  .btn-back{background:none;color:var(--text-soft);text-decoration:underline;font-weight:500;font-size:12px;margin-top:10px;padding:4px}

  .confirm-cal-row{display:flex;gap:10px;margin-top:16px}
  .confirm-cal-row .btn{flex:1;margin-top:0}

  /* ---------- Directions ---------- */
  .directions-card{padding:1rem 1.25rem}
  .directions-row{display:flex;gap:10px}
  .directions-row .btn{flex:1;margin-top:0;display:flex;align-items:center;justify-content:center;gap:7px}
  .directions-row svg{width:16px;height:16px;flex:none}

  .hint{font-size:11px;color:var(--text-soft);margin-top:4px}

  .times{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .time-chip{
    background:var(--chip-bg);
    border:1px solid var(--chip-border);
    color:var(--accent);
    border-radius:10px;
    padding:9px 16px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s,color .15s;
    font-family:inherit;
  }
  .time-chip:hover{background:var(--chip-hover)}

  .sheet-backdrop{
    position:fixed;inset:0;
    background:rgba(116,115,114,.32);
    opacity:0;pointer-events:none;
    transition:opacity .25s ease;
    z-index:10;
  }
  .sheet-backdrop.open{opacity:1;pointer-events:auto}

  .sheet{
    position:fixed;left:0;right:0;bottom:0;
    max-width:440px;margin:0 auto;
    background:var(--card);
    border-radius:22px 22px 0 0;
    border:1px solid var(--border);
    border-bottom:none;
    padding:10px 1.25rem calc(1.5rem + env(safe-area-inset-bottom));
    transform:translateY(100%);
    transition:transform .3s cubic-bezier(.32,.72,0,1);
    z-index:11;
    max-height:82vh;
    overflow-y:auto;
  }
  .sheet.open{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;background:var(--chip-border);border-radius:2px;margin:0 auto 14px}
  .sheet-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .sheet-title{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:600;color:var(--accent);text-transform:capitalize}
  .sheet-close{
    width:28px;height:28px;border-radius:50%;border:none;background:var(--chip-bg);
    color:var(--accent-soft);font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .sheet-back{
    font-size:12px;color:var(--text-soft);background:none;border:none;
    cursor:pointer;text-decoration:underline;font-family:inherit;padding:0;margin-bottom:10px;
  }

  /* ---------- Services list ---------- */
  .services-card h1{margin-bottom:2px}
  .service-list{margin-top:.5rem}
  .service-item{border-top:1px solid var(--chip-border)}
  .service-item:first-child{border-top:none}
  .service-head{
    width:100%;
    display:flex;
    align-items:flex-start;
    gap:14px;
    padding:14px 2px;
    background:none;
    border:none;
    text-align:left;
    cursor:pointer;
    font-family:inherit;
  }
  .service-thumb{
    flex:none;
    width:80px;height:80px;
    border-radius:14px;
    background-size:cover;
    background-position:center;
  }
  .service-thumb[data-tone="1"]{background-image:url('https://i.postimg.cc/k4SwnFhd/DSC-0205.jpg')}
  .service-thumb[data-tone="2"]{background-image:url('https://i.postimg.cc/9M91Wtg8/DSC-0113.jpg')}
  .service-thumb[data-tone="3"]{background-image:url('https://i.postimg.cc/V6t4YBZV/DSC-0285.jpg')}
  .service-thumb[data-tone="4"]{background-image:url('https://i.postimg.cc/wBZ08b2S/DSC-3262.jpg')}
  .service-head-text{flex:1;min-width:0}
  .service-badge{
    display:inline-block;
    background:var(--accent);
    color:var(--card);
    font-size:10px;
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
    border-radius:5px;
    padding:2px 7px;
    margin-bottom:5px;
  }
  .service-name{font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;color:var(--accent)}
  .service-tagline{font-size:12.5px;color:var(--text-soft);margin-top:1px}
  .service-chevron{
    flex:none;
    color:var(--text-soft);
    font-size:22px;
    margin-top:8px;
    transition:transform .25s ease;
  }
  .service-item.open .service-chevron{transform:rotate(180deg)}
  .service-item.open .service-head .service-thumb{display:none}

  .service-body{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows .3s ease;
  }
  .service-item.open .service-body{grid-template-rows:1fr}
  .service-body-inner{overflow:hidden}
  .service-body-content{padding:0 2px 18px 2px}
  .service-body-content .service-thumb-lg{
    width:100%;height:315px;border-radius:14px;margin-bottom:12px;
  }
  .service-desc{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:10px}
  .service-effects-label{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:6px}
  .service-effects{list-style:none;margin-bottom:12px}
  .service-effects li{font-size:13px;color:var(--text);padding-left:16px;position:relative;margin-bottom:4px;line-height:1.4}
  .service-effects li::before{content:'•';position:absolute;left:2px;color:var(--accent-soft)}
  .service-prices{background:var(--chip-bg);border-radius:12px;padding:10px 14px;margin-bottom:4px}
  .service-price-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text);padding:4px 0}
  .service-price-row + .service-price-row{border-top:1px dashed var(--chip-border)}
  .service-price-row span:last-child{font-weight:600;color:var(--accent)}
  .service-book-btn{margin-top:14px}

  /* ---------- Gift card ---------- */
  .gift-photo{
    width:100%;
    aspect-ratio:16/10;
    object-fit:cover;
    border-radius:16px;
    display:block;
    margin-bottom:14px;
    box-shadow:0 8px 24px rgba(116,115,114,.28);
  }
  .gift-desc{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:10px}
  .gift-details-label{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:6px}

  .rsvp-building-photo{width:100%;border-radius:14px;display:block;margin:10px 0;box-shadow:0 8px 24px rgba(116,115,114,.28)}

  /* ---------- RSVP merged card ---------- */
  .hero-card.rsvp-merged{margin-bottom:0;border-radius:20px 20px 0 0;border-bottom:none}
  #rsvp-card.rsvp-merged{border-radius:0 0 20px 20px;border-top:none;margin-top:0}

  /* ---------- Confirmation popup ---------- */
  #sheet-step-success{min-height:50vh;display:flex;flex-direction:column;position:relative}
  #sheet-step-success #sheet-close-3{position:absolute;top:0;right:0}
  #sheet-step-success .confirm-message{
    font-family:'Montserrat',sans-serif;
    font-size:14px;font-weight:600;color:var(--accent);
    padding-right:30px;margin-bottom:16px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  #sheet-step-success .service-prices{padding:14px 16px}
  #sheet-step-success .service-price-row{flex-direction:column;align-items:flex-start;gap:2px;padding:10px 0}
  #sheet-step-success .service-price-row span:first-child{font-size:12px;color:var(--text-soft);font-weight:600}
  #sheet-step-success .service-price-row span:last-child{font-size:16px;text-align:left}
  #sheet-step-success .gift-details-label{font-size:15px;margin-top:22px}
  #sheet-step-success .confirm-cal-row{margin-top:12px;gap:12px}
  #sheet-step-success .confirm-cal-row .btn{font-size:16px;padding:16px}
  #sheet-step-success .hint{font-size:14px;line-height:1.6;margin-top:14px}
</style>
</head>

<div class="wrap">

  <div class="card hero-card">
    <div class="hero-photo">
      <div class="lang-switch" id="lang-switch">
        <button class="lang-toggle" id="lang-toggle" type="button" aria-haspopup="listbox" aria-expanded="false">

          <svg viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="lang-menu" id="lang-menu" role="listbox" aria-label="Language / Valoda / Язык">

          <button class="lang-option" type="button" role="option" data-lang="ru">RU</button>

    <div class="hero-logo-wrap">
      <div class="hero-logo">
        <img src="https://i.postimg.cc/Jzd90xK0/Bodylab-Beauty-Logo.jpg" alt="BodyLab.Beauty">

    <div class="hero-content">
      <h1 data-i18n="hero_title"></h1>

  function applyTranslations(){
    document.documentElement.lang = currentLang;
    document.title = `BodyLab.Beauty — ${t('title_suffix')}`;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const val = I18N[currentLang][key];
      if(val == null) return;
      const attr = el.getAttribute('data-i18n-attr');
      if(attr){
        el.setAttribute(attr, val);
      } else if(el.hasAttribute('data-i18n-html')){
        el.innerHTML = val;
      } else {
        el.textContent = val;
      }
    });

    document.querySelectorAll('.lang-option').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    langCurrent.textContent = currentLang.toUpperCase();

    document.getElementById('gift-order-btn').href = `https://api.whatsapp.com/send?phone=37120888805&text=${encodeURIComponent(t('gift_wa_message'))}`;

    if(monthKeys.length) renderCalendar();

    if(selectedSlot) updateSelectedSlotLabel(selectedSlot);
    if(!submitBtn.disabled) submitBtn.textContent = t('submit_btn');

  function formatTime(dateStr){
    const d = new Date(dateStr);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function dateKeyOf(dateStr){ return dateStr.slice(0,10); }

  async function loadSlots(){
    const currentMonthKey = monthKeys[monthIndex];
    try{
      const bustUrl = `${SLOTS_URL}${SLOTS_URL.includes('?') ? '&' : '?'}t=${Date.now()}`;
      const res = await fetch(bustUrl, { method: 'GET', cache: 'no-store' });
      if(!res.ok) throw new Error('bad response');
      const slots = await res.json();

      if(!Array.isArray(slots) || slots.length === 0){
        calArea.innerHTML = '<div class="empty" data-i18n="cal_empty" data-i18n-html></div>';
        applyTranslations();
        slotsByDate = {};
        monthKeys = [];
        return;
      }

      slots.sort((a,b) => new Date(a.start) - new Date(b.start));

      slotsByDate = {};
      slots.forEach(slot => {
        const key = dateKeyOf(slot.start);
        if(!slotsByDate[key]) slotsByDate[key] = [];
        slotsByDate[key].push(slot);
      });

      monthKeys = [...new Set(Object.keys(slotsByDate).map(k => k.slice(0,7)))].sort();
      const preservedIndex = currentMonthKey ? monthKeys.indexOf(currentMonthKey) : -1;
      monthIndex = preservedIndex !== -1 ? preservedIndex : 0;
      renderCalendar();

    }catch(err){
      calArea.innerHTML = '<div class="error" data-i18n="cal_error" data-i18n-html></div>';
      applyTranslations();
    }
  }

  function renderCalendar(){
    const monthKey = monthKeys[monthIndex];
    const [year, month] = monthKey.split('-').map(Number);
    const firstDay = new Date(year, month-1, 1);
    const daysInMonth = new Date(year, month, 0).getDate();
    const startOffset = (firstDay.getDay() + 6) % 7;

    const todayKey = new Date().toISOString().slice(0,10);
    const MONTHS = t('months');
    const WEEKDAYS_GRID = t('weekdays_grid');

    let html = '';
    html += `<div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev" type="button" ${monthIndex===0?'disabled':''} aria-label="${t('cal_prev_aria')}">‹</button>
      <div class="cal-month-label">${MONTHS[month-1]} ${year}</div>
      <button class="cal-nav-btn" id="cal-next" type="button" ${monthIndex===monthKeys.length-1?'disabled':''} aria-label="${t('cal_next_aria')}">›</button>
    </div>`;

    html += '<div class="cal-weekdays">' + WEEKDAYS_GRID.map(w => `<span>${w}</span>`).join('') + '</div>';
    html += '<div class="cal-grid">';

    for(let i=0;i<startOffset;i++){ html += '<div class="cal-cell"></div>'; }

    for(let d=1; d<=daysInMonth; d++){
      const dd = String(d).padStart(2,'0');
      const mm = String(month).padStart(2,'0');
      const dateKey = `${year}-${mm}-${dd}`;
      const hasSlots = !!slotsByDate[dateKey];
      const isToday = dateKey === todayKey;
      html += `<div class="cal-cell"><button type="button" class="cal-day${hasSlots?' available':''}${isToday?' today':''}" data-date="${dateKey}" ${hasSlots?'':'disabled'}>${d}</button></div>`;
    }

    html += '</div>';
    calArea.innerHTML = html;

    document.getElementById('cal-prev')?.addEventListener('click', () => { monthIndex--; renderCalendar(); });
    document.getElementById('cal-next')?.addEventListener('click', () => { monthIndex++; renderCalendar(); });

    calArea.querySelectorAll('.cal-day.available').forEach(btn => {
      btn.addEventListener('click', () => openDaySheet(btn.dataset.date));
    });
  }

  function toGCalDate(iso){
    return iso.replace(/[-:]/g,'').replace(/\.\d{3}Z$/,'Z');
  }

  function buildEventDescription(service, fullName){
    return [
      `${t('gcal_details_label')} ${service}`,
      `${t('gcal_name_label')} ${fullName}`,
      `${t('gcal_address_label')} Augusta Deglava iela 66, Rīga`,
      `${t('gcal_phone_label')} +371 20 888 805`,
      `${t('gcal_instagram_label')} instagram.com/bodylab.beauty`
    ].join('\n');
  }

  function buildGCalLink(slot, service, fullName){
    const dates = toGCalDate(slot.start) + '/' + toGCalDate(slot.end);
    const text = encodeURIComponent(`BodyLab.Beauty — ${service}`);
    const details = encodeURIComponent(buildEventDescription(service, fullName));
    const location = encodeURIComponent('Augusta Deglava iela 66, Rīga');
    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${dates}&details=${details}&location=${location}`;
  }

  function icsEscape(str){
    return String(str).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
  }

  let icsObjectUrl = null;

  function buildICSBlobUrl(slot, service, fullName){
    const uid = `${slot.event_id || Date.now()}@bodylab.beauty`;
    const dtStamp = toGCalDate(new Date().toISOString());
    const summary = icsEscape(`BodyLab.Beauty — ${service}`);
    const description = icsEscape(buildEventDescription(service, fullName));
    const location = icsEscape('Augusta Deglava iela 66, Rīga');
    const ics = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//BodyLab.Beauty//Booking//LV',
      'CALSCALE:GREGORIAN',
      'BEGIN:VEVENT',
      `UID:${uid}`,
      `DTSTAMP:${dtStamp}`,
      `DTSTART:${toGCalDate(slot.start)}`,
      `DTEND:${toGCalDate(slot.end)}`,
      `SUMMARY:${summary}`,
      `DESCRIPTION:${description}`,
      `LOCATION:${location}`,
      'END:VEVENT',
      'END:VCALENDAR'
    ].join('\r\n');
    if(icsObjectUrl) URL.revokeObjectURL(icsObjectUrl);
    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    icsObjectUrl = URL.createObjectURL(blob);
    return icsObjectUrl;
  }

  submitBtn.addEventListener('click', async () => {
    const first_name  = document.getElementById('first_name').value.trim();
    const last_name   = document.getElementById('last_name').value.trim();
    const phoneCode   = document.getElementById('phone_code').value;
    const phoneNumber = document.getElementById('phone').value.trim();
    const phone       = phoneNumber ? `${phoneCode} ${phoneNumber}` : '';
    const instagram   = document.getElementById('instagram').value.trim();
    const service     = document.getElementById('service').value.trim();

    if(!first_name || !last_name || !phoneNumber || !service){
      formError.textContent = t('err_required');
      return;
    }

    const phoneOption = phoneCodeSelect.options[phoneCodeSelect.selectedIndex];
    const phoneDigits = phoneNumber.replace(/\D/g, '');
    const phoneMin = Number(phoneOption?.dataset.min || 0);
    const phoneMax = Number(phoneOption?.dataset.max || 15);
    if(phoneDigits.length < phoneMin || phoneDigits.length > phoneMax){
      formError.textContent = t('err_phone_invalid');
      return;
    }

    if(!selectedSlot){
      formError.textContent = t('err_no_slot');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = t('submit_sending');
    formError.textContent = '';

    try{
      const res = await fetch(BOOK_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          event_id: selectedSlot.event_id,
          calendar_id: selectedSlot.calendar_id,
          first_name, last_name, phone, instagram, service
        })
      });
      const bookingStatus = res.headers.get('X-Booking-Status');

      if(bookingStatus === 'success'){
        const fullName = `${first_name} ${last_name}`.trim();
        showConfirmation(selectedSlot, service, fullName);
      } else if(bookingStatus === 'taken'){
        formError.textContent = t('err_slot_taken');
        submitBtn.disabled = false;
        submitBtn.textContent = t('submit_btn');
        selectedSlot = null;
        await loadSlots();
      } else {
        formError.textContent = t('err_generic');
        submitBtn.disabled = false;
        submitBtn.textContent = t('submit_btn');
      }
    }catch(err){
      formError.textContent = t('err_generic');
      submitBtn.disabled = false;
      submitBtn.textContent = t('submit_btn');
    }
  });

  // ---------- Services accordion ----------
  document.querySelectorAll('.service-head').forEach(head => {
    head.addEventListener('click', () => {
      const item = head.closest('.service-item');
      const willOpen = !item.classList.contains('open');
      document.querySelectorAll('.service-item.open').forEach(el => {
        if(el !== item){
          el.classList.remove('open');
          el.querySelector('.service-head').setAttribute('aria-expanded','false');
        }
      });
      item.classList.toggle('open', willOpen);
      head.setAttribute('aria-expanded', String(willOpen));
    });
  });

  document.querySelectorAll('.service-book-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      pendingService = btn.dataset.service;
      calendarCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  // ---------- RSVP landing page ----------
  // Reached via a link like:
  // https://<your-site>/?rsvp=1&event_id=...&calendar_id=...&service=R-Sleek%20(45%20min)&start=2026-07-20T13%3A00%3A00.000Z&name=J%C4%81nis%20B%C4%93rzi%C5%86%C5%A1
  function initRsvpMode(params){
    document.querySelector('.hero-content').style.display = 'none';
    document.querySelector('.hero-card').classList.add('rsvp-merged');
    document.getElementById('rsvp-card').classList.add('rsvp-merged');
    document.getElementById('rsvp-card').style.display = 'block';
    document.getElementById('rsvp-contact-card').style.display = 'block';
    document.getElementById('calendar-card').style.display = 'none';
    document.querySelector('.directions-card').style.display = 'none';
    document.querySelector('.services-card').style.display = 'none';
    document.querySelector('.gift-card').style.display = 'none';

    const eventId    = params.get('event_id') || '';
    const calendarId = params.get('calendar_id') || '';
    const service    = params.get('service') || '';
    const name       = params.get('name') || '';
    const startIso   = params.get('start') || '';

    document.getElementById('rsvp-name').textContent = name;
    document.getElementById('rsvp-service').textContent = service;
    if(startIso){
      const d = new Date(startIso);
      document.getElementById('rsvp-date').textContent = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;
      document.getElementById('rsvp-time').textContent = formatTime(startIso);
    }

    document.getElementById('rsvp-whatsapp-btn').href =
      `https://api.whatsapp.com/send?phone=37120888805&text=${encodeURIComponent(t('rsvp_wa_message').replace('{service}', service).replace('{time}', startIso ? formatTime(startIso) : ''))}`;
    document.getElementById('rsvp-home-link').href = window.location.origin + window.location.pathname;

    const confirmBtn = document.getElementById('rsvp-confirm-btn');
    const declineBtn = document.getElementById('rsvp-decline-btn');
    const resultEl   = document.getElementById('rsvp-result');

    async function sendRsvp(action){
      if(!eventId || !calendarId){
        resultEl.textContent = t('rsvp_error');
        return;
      }
      if(!RSVP_URL){
        resultEl.textContent = t('rsvp_not_configured');
        return;
      }
      confirmBtn.disabled = true;
      declineBtn.disabled = true;
      resultEl.textContent = '';
      try{
        const res = await fetch(RSVP_URL, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ event_id: eventId, calendar_id: calendarId, action })
        });
        if(!res.ok) throw new Error('bad response');
        document.getElementById('rsvp-actions').style.display = 'none';
        resultEl.textContent = action === 'confirm' ? t('rsvp_thanks_confirmed') : t('rsvp_thanks_declined');
      }catch(err){
        resultEl.textContent = t('rsvp_error');
        confirmBtn.disabled = false;
        declineBtn.disabled = false;
      }
    }

    confirmBtn.addEventListener('click', () => sendRsvp('confirm'));
    declineBtn.addEventListener('click', () => sendRsvp('decline'));
  }

  applyTranslations();

  const rsvpParams = new URLSearchParams(window.location.search);
  if(rsvpParams.get('rsvp') === '1'){
    initRsvpMode(rsvpParams);
  } else {
    loadSlots();
    setInterval(loadSlots, 60000);
  }
</script>
</body>
</html>
